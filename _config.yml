title: Articles & Essays
tagline: A collection of writing by Tom Winans
description: Articles and essays on technology, AI, and other topics.
url: "https://articles-and-essays.concentrum.com"
baseurl: ""

# Theme
theme: jekyll-theme-chirpy

# Author
avatar: /assets/img/avatar.png
social:
  name: Tom Winans

# Appearance
theme_mode: light

# Date format
timezone: America/New_York

# Pagination
paginate: 10

# Collections
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

sass:
  style: compressed

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - "*.gem"
  - .github
