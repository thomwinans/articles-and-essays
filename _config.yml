title: Articles & Essays
tagline: A collection of writing by Tom Winans
description: Articles and essays on technology, AI, and other topics.
url: "https://articles-and-essays.concentrum.com"
baseurl: ""

# Theme
remote_theme: cotes2020/jekyll-theme-chirpy

# Author
social:
  name: Tom Winans

# Appearance
theme_mode: # [light | dark] - leave blank for user preference

# Date format
timezone: America/New_York

# Pagination
paginate: 10

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

# Archives
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
